<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-PMS | Procurement & Supply Chain</title>
    <meta name="description" content="AI-Powered Procurement and Supply Chain Management System Dashboard.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="shield-check" class="logo-icon"></i>
                    <span class="logo-text">AI-PMS</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-link active" id="nav-dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <div class="nav-section">MANAGEMENT</div>
                <a href="#vendors" class="nav-link" id="nav-vendors">
                    <i data-lucide="users"></i>
                    <span>Vendors</span>
                </a>
                <a href="#materials" class="nav-link" id="nav-materials">
                    <i data-lucide="package"></i>
                    <span>Materials</span>
                </a>
                <div class="nav-section">OPERATIONS</div>
                <a href="#purchase-orders" class="nav-link" id="nav-purchase-orders">
                    <i data-lucide="shopping-cart"></i>
                    <span>Purchase Orders</span>
                </a>
                <a href="#deliveries" class="nav-link" id="nav-deliveries">
                    <i data-lucide="truck"></i>
                    <span>Deliveries</span>
                </a>
                <a href="#fat-tests" class="nav-link" id="nav-fat-tests">
                    <i data-lucide="clipboard-check"></i>
                    <span>FAT Tests</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">AD</div>
                    <div class="user-info">
                        <span class="user-name">Admin User</span>
                        <span class="user-role">Procurement Head</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1 id="page-title">Dashboard</h1>
                </div>
                <div class="header-right">
                    <div class="search-bar">
                        <i data-lucide="search"></i>
                        <input type="text" placeholder="Search anything...">
                    </div>
                    <button class="icon-button">
                        <i data-lucide="bell"></i>
                        <span class="badge">3</span>
                    </button>
                    <button class="icon-button">
                        <i data-lucide="settings"></i>
                    </button>
                </div>
            </header>
            
            <div id="content-area" class="content-area">
                <!-- Content will be injected here by JS -->
                <div class="loader-container">
                    <div class="loader"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal System -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Modal Title</h3>
                <button class="icon-button" onclick="UI.closeModal()">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Form content will be injected here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/vendors.js"></script>
    <script src="js/views/materials.js"></script>
    <script src="js/views/purchase-orders.js"></script>
    <script src="js/views/deliveries.js"></script>
    <script src="js/views/fat-tests.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
