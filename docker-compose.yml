version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: procurement_module
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password123@db:5432/procurement_module
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
